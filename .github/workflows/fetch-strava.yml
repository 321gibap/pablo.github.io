name: Fetch Strava Data

on:
  schedule:
    - cron: "0 4 * * *"   # runs daily at 4am UTC
  workflow_dispatch:        # lets you trigger it manually from GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest

    permissions:
      contents: write       # needed to commit the JSON files back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Strava data
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: python scripts/fetch_strava.py

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: update Strava data $(date -u +%Y-%m-%d)"
          git push
